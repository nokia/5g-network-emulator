[Global]
duration: -1
period: 1
multithreading: true
threads: 16
# VERBOSITY
verbose: true

##############
# REAL UE
##############
[UE]
ue_id: idReal
# Type 1 = SIM UE
# Type 0 = REAL UE
ue_type: 0
# UL Netfilter Queue index
ul_queue_n: 100
dl_queue_n: 101
n_ues: 1
# UE CONFIG
n_antennas: 1
alpha_ul: 0.8
nominal_pusch_p0: -60 
set_ul_pow: true
tx_power_ul: 23
cqi_period: 5
ri_period: 5
scaling_factor: 1
random_v: true
    
# LOG DATA
log_freq: 100
log_ue: true
log_quality: true
log_traffic: true
log_mobility: true
# TRAFFIC MODEL CONFIG
traffic_type: 0
ul_target: 20.0
dl_target: 20.0
var_perc: 0.10
pkt_size: 12000
# MOBILITY MODEL CONFIG
mobility_type: 5
pos_x: -108
pos_y: 0
random_init: false
speed: 100.0 #in km/h
speed_var: 0.0
max_distance: 5000
time_target: 5
time_target_var: 0
# PRIORITY
priority: 4
# METRIC COFIGURATION
delta_metric: 1.0
delay_t_metric: 0.1
beta_metric: 0.5
# SCENARIO
ue_height: 1.5
o2i: 10 #OUTDOOR 10, IN_BUILDING 11, IN_CAR 12, RANDOM 13
# L4S / DualQ
l4s_dual_queue: true
l4s_force_ect1: false
l4s_target_ms: 15
l4s_rtt_max_ms: 100
l4s_min_th_us: 2000
l4s_range_us: 9000
l4s_k: 2.0
l4s_classic_guard_ms: 1.0

##############
# SIMULATED UE 
##############
[UE]
ue_id: idSimulated
# Type 1 = SIM UE
# Type 0 = REAL UE
ue_type: 1
n_ues: 0
n_antennas: 1
alpha_ul: 0.8
nominal_pusch_p0: -50 
set_ul_pow: true
tx_power_ul: 23
cqi_period: 5
ri_period: 5
scaling_factor: 1
# LOG DATA
log_freq: 100
log_ue: true
log_quality: true
log_traffic: true
log_mobility: true
# TRAFFIC MODEL CONFIG
traffic_type: 0
ul_target: 10.0
dl_target: 10.0
var_perc: 0.10
pkt_size: 12000
# MOBILITY MODEL CONFIG
mobility_type: 5 #STATIC_MODEL 0, RANDOM_WALK_MODEL 1, RANDOM_WAYPOINT_MODEL 2, RANDOM_MANHATTAN_MODEL 3, LINEAR_DRIFT_MODEL 4
pos_x: 500
pos_y: 500
random_init: false
speed: 0.0 #in km/h
speed_var: 0.0
max_distance: 50000
time_target: 5
time_target_var: 0
# PRIORITY
priority: 1
# METRIC COFIGURATION
delta_metric: 1.0
delay_t_metric: 0.1
beta_metric: 0.01
# SCENARIO
ue_height: 1.5
o2i: 10 #OUTDOOR 10, IN_BUILDING 11, IN_CAR 12,RANDOM 13
# L4S / DualQ
l4s_dual_queue: true
l4s_force_ect1: false
l4s_target_ms: 15
l4s_rtt_max_ms: 100
l4s_min_th_us: 10000
l4s_range_us: 10000
l4s_k: 2.00
l4s_classic_guard_ms: 1.0

#################
# SCENARIO CONFIG
#################
[Scenario]
scenario_type: 2  #URBAN_MICROCELL 0, URBAN_MACROCELL 1, RURAL_MACROCELL 2,INDOOR_HOTSPOT 3, INDOOR_FACTORY 4
############
# eNB CONFIG
############
[eNBConfig]
# 64QAM - 0 / 256QAM - 1
modulation_m: 1
target_ber: 0.00005
# Wideband - 0 / Subband - 1
cqi_mode: 1
tx_power: 43 #in dBm
eNB_gain: 8.7 #eNB antenna
UT_gain: 0 #UT antenna
power_boost: 2 #this is for RSRP calculation
frequency: 700000000.0
bandwidth: 20000000

#######################
# PDCP/RLC Layer CONFIG
#######################
[PDCP_RLC]
# PDCP CONFIG
backhaul_d: 0.003
backhaul_d_var: 0.0
# RLC LAYER
order_pkts: true

##################
# MAC Layer CONFIG
##################
[MACLayer]
# METRIC COFIGURATION
metric_type: 5 #METRIC_FIFO 0, METRIC_BET 1, METRIC_DIST_DELAY 2, METRIC_W_DELAY 3, METRIC_MAX_TP 4, METRIC_RR 5, METRIC_PF 6
# LOG DATA
log_freq: 10
log_mac: true
# MAC LAYER
mimo_layers: 1 
ofdm_symbols: 14
numerology: 1
# PDCP UL CONFIG
max_rtx_ul: 4
# PDCP DL CONFIG
max_rtx_dl: 4
# Use MCS tables or SNR Gap Eq.
mcs_tables: true
# Time grouping (1 is grouping)
scheduling_mode: 0
# Freq grouping (0 is grouping)
scheduling_type: 1
scheduling_config: 1
# 1 : FDD - 0 : TDD
duplexing_type: 0
#If TDD
n_dl_slots: 7
n_ul_slots: 3
transition_c: 54
#If FDD
ratio_DL_UL: 0.7# BW percentage occupied by the DL 


##################
# PHY Layer CONFIG
##################
[PHYLayer]
# NOISE INTERFERENCE
interference_ues: 5 
interference_eNBs: 1
distance_interference: 3500
interfered_bandwidth_ratio: 0.1
enb_noise_figure: 2
ut_noise_figure: 9
# Modeled delays UL
air_delay_var_ul: 0.0
rtx_period_ul: 0.004
rtx_period_var_ul: 0
rtx_proc_delay_ul: 0.002
rtx_proc_delay_var_ul: 0.0
# Modeled delays DL
air_delay_var_dl: 0.0
rtx_period_dl: 0.005
rtx_period_var_dl: 0
rtx_proc_delay_dl: 0.002
rtx_proc_delay_var_dl: 0.0

##################
# Monitoring
##################
[Monitoring]
enabled: true
aggregation_window_ms: 500
default_metric_type: counter
emit_ue_phy: true
emit_ue_pdcp: true
emit_ue_mobility: true
emit_l4s: true
emit_mac_scheduler: true
emit_emulator_runtime: true
emit_runtime_debug_logs: false
emit_text_logs_compat: false
outputs: dashboard_udp
output_dashboard_udp_type: udp
output_dashboard_udp_address: 127.0.0.1
output_dashboard_udp_port: 8096
