[Global]
# Realtime execution for the live dashboard.
duration: 180
period: 1
multithreading: false
threads: 0
verbose: true

##############
# REAL UE
##############
[UE]
ue_id: idReal
ue_type: 0
ul_queue_n: 0
dl_queue_n: 1
# Keep the real UE definition disabled so the config runs standalone.
n_ues: 0
n_antennas: 1
alpha_ul: 0.8
nominal_pusch_p0: -60
set_ul_pow: true
tx_power_ul: 23
cqi_period: 5
ri_period: 5
scaling_factor: 1
random_v: true
log_freq: 100
log_ue: false
log_quality: false
log_traffic: false
log_mobility: false
traffic_type: 0
ul_target: 20.0
dl_target: 20.0
var_perc: 0.10
pkt_size: 12000
mobility_type: 5
pos_x: 0
pos_y: 100
random_init: false
speed: 1.0
speed_var: 0.0
max_distance: 5000
time_target: 5
time_target_var: 0
priority: 1
delta_metric: 1.0
delay_t_metric: 0.1
beta_metric: 0.5
ue_height: 1.5
o2i: 10
l4s_dual_queue: true
l4s_force_ect1: true
l4s_target_ms: 15
l4s_rtt_max_ms: 100
l4s_min_th_us: 800
l4s_range_us: 400
l4s_k: 2.0
l4s_classic_guard_ms: 1.0

