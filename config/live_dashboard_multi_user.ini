#################
# SCENARIO CONFIG
#################
[Scenario]
scenario_type: 2

############
# eNB CONFIG
############
[eNBConfig]
modulation_m: 1
target_ber: 0.000005
cqi_mode: 1
tx_power: 43
eNB_gain: 8.7
UT_gain: 0
power_boost: 2
frequency: 3500000000.0
bandwidth: 20000000

#######################
# PDCP/RLC Layer CONFIG
#######################
[PDCP_RLC]
backhaul_d: 0.003
backhaul_d_var: 0.0
order_pkts: true

##################
# MAC Layer CONFIG
##################
[MACLayer]
metric_type: 4
log_freq: 100
log_mac: false
mimo_layers: 4
ofdm_symbols: 14
numerology: 1
max_rtx_ul: 4
max_rtx_dl: 4
mcs_tables: true
scheduling_mode: 0
scheduling_type: 1
scheduling_config: 1
duplexing_type: 0
n_dl_slots: 7
n_ul_slots: 3
transition_c: 54
ratio_DL_UL: 0.5

##################
# PHY Layer CONFIG
##################
[PHYLayer]
interference_ues: 5
interference_eNBs: 1
distance_interference: 3500
interfered_bandwidth_ratio: 0.1
enb_noise_figure: 2
ut_noise_figure: 9
air_delay_var_ul: 0.0
rtx_period_ul: 0.004
rtx_period_var_ul: 0
rtx_proc_delay_ul: 0.002
rtx_proc_delay_var_ul: 0.0
air_delay_var_dl: 0.0
rtx_period_dl: 0.005
rtx_period_var_dl: 0
rtx_proc_delay_dl: 0.002
rtx_proc_delay_var_dl: 0.0

##################
# Monitoring
##################
[Monitoring]
enabled: true
aggregation_window_ms: 500
default_metric_type: counter
emit_ue_phy: true
emit_ue_pdcp: true
emit_ue_mobility: true
emit_l4s: true
emit_mac_scheduler: true
emit_emulator_runtime: true
emit_runtime_debug_logs: false
emit_text_logs_compat: false
outputs: dashboard_udp
output_dashboard_udp_type: udp
output_dashboard_udp_address: 127.0.0.1
output_dashboard_udp_port: 8096
